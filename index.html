<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>El Pollo Loco</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rye&display=swap"
      rel="stylesheet"
    />

    <script src="./models/drawable-object.class.js"></script>
    <script src="./models/moveable-object.class.js"></script>
    <script src="./models/character.class.js"></script>
    <script src="./models/chicken.class.js"></script>
    <script src="./models/cloud.class.js"></script>
    <script src="./models/status-bar.class.js"></script>
    <script src="./models/coin.class.js"></script>
    <script src="./models/bottle-ground.class.js"></script>
    <script src="./models/world.class.js"></script>
    <script src="./models/backgound-object.class.js"></script>
    <script src="./models/keyboard.class.js"></script>
    <script src="./models/level.class.js"></script>
    <script src="models/throwable-object.class.js"></script>
    <script src="./models/endboss.class.js"></script>
    <script src="./levels/level1.js"></script>
    <script src="./js/game.js"></script>
  </head>
  <body>
    <!-- START SCREEN -->
    <div id="start-screen">
      <h1>El Pollo Loco</h1>
      <div class="key-info">
        <h2>🎮 Steuerung</h2>
        <table>
          <tr>
            <td>⬅ ➡</td>
            <td>Bewegen</td>
          </tr>
          <tr>
            <td>⎵ Leertaste</td>
            <td>Springen</td>
          </tr>
          <tr>
            <td>D</td>
            <td>Flasche werfen</td>
          </tr>
          <tr>
            <td>F</td>
            <td>Fullscreen</td>
          </tr>
        </table>
      </div>
      <button id="start-btn" onclick="startGame()">▶ Spiel starten</button>
      <button id="fullscreen-btn" onclick="toggleFullscreen()">
        ⛶ Vollbild
      </button>
    </div>

    <!-- GAME CONTAINER -->
    <div id="game-container" style="display: none; position: relative">
      <canvas id="canvas" width="720" height="480"></canvas>

      <!-- GAME OVER SCREEN -->
      <div id="game-over-screen" style="display: none">
        <h2>💀 Game Over</h2>
        <p>Du wurdest besiegt!</p>
        <button onclick="restartGame()">🔄 Neu starten</button>
      </div>

      <!-- WIN SCREEN -->
      <div id="win-screen" style="display: none">
        <h2>🎉 Du hast gewonnen!</h2>
        <p>El Pollo Loco wurde besiegt!</p>
        <button onclick="restartGame()">🔄 Nochmal spielen</button>
      </div>

      <!-- HUD CONTROLS -->
      <div id="hud">
        <span id="bottle-count">🍾 Flaschen: 0</span>
        <span id="coin-count">🪙 Coins: 0</span>
        <button id="fs-btn" onclick="toggleFullscreen()" title="Fullscreen">
          ⛶
        </button>
      </div>

      <!-- KEY LEGEND -->
      <div id="key-legend">
        ⬅➡ Bewegen &nbsp;|&nbsp; ⎵ Springen &nbsp;|&nbsp; D Werfen &nbsp;|&nbsp;
        F Vollbild
      </div>
    </div>
  </body>
</html>
