<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>El Pollo Loco</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rye&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="mobile.css" />

    <!-- Game classes -->
    <script src="./models/drawable-object.class.js"></script>
    <script src="./models/moveable-object.class.js"></script>
    <script src="./models/character.class.js"></script>
    <script src="./models/chicken.class.js"></script>
    <script src="./models/cloud.class.js"></script>
    <script src="./models/status-bar.class.js"></script>
    <script src="./models/coin.class.js"></script>
    <script src="./models/bottle-ground.class.js"></script>
    <script src="./models/backgound-object.class.js"></script>
    <script src="./models/keyboard.class.js"></script>
    <script src="./models/level.class.js"></script>
    <script src="./models/throwable-object.class.js"></script>
    <script src="./models/endboss.class.js"></script>
    <script src="./models/world.class.js"></script>

    <!-- Level + Game logic -->
    <script src="./levels/level1.js"></script>
    <script src="./models/mobile-controls.js"></script>
    <script src="./js/game.js"></script>
  </head>
  <body>
    <!-- ══ START SCREEN ══════════════════════════════════════════════════ -->
    <div id="start-screen">
      <div class="start-bg">
        <img
          src="./img/9_intro_outro_screens/start/startscreen_1.png"
          alt="El Pollo Loco"
        />
      </div>
      <div class="start-overlay">
        <!-- Desktop-Hinweis -->
        <div class="key-info" id="keyboard-info">
          <h2>🎮 Tastatur</h2>
          <table>
            <tr>
              <td>⬅ ➡</td>
              <td>Bewegen</td>
            </tr>
            <tr>
              <td>⎵</td>
              <td>Springen</td>
            </tr>
            <tr>
              <td>D</td>
              <td>Flasche werfen</td>
            </tr>
            <tr>
              <td>F</td>
              <td>Vollbild</td>
            </tr>
          </table>
        </div>

        <!-- Mobile-Hinweis -->
        <div class="key-info" id="touch-info">
          <h2>👆 Touch</h2>
          <table>
            <tr>
              <td>◀ ▶</td>
              <td>Bewegen</td>
            </tr>
            <tr>
              <td>⬆</td>
              <td>Springen</td>
            </tr>
            <tr>
              <td>🍾</td>
              <td>Werfen</td>
            </tr>
          </table>
        </div>

        <div class="start-buttons">
          <button id="start-btn" onclick="startGame()">▶ Spiel starten</button>
          <button id="fullscreen-btn" onclick="toggleFullscreen()">
            ⛶ Vollbild
          </button>
        </div>
      </div>
    </div>

    <!-- ══ GAME WRAPPER ══════════════════════════════════════════════════ -->
    <div id="game-wrapper" style="display: none">
      <div id="game-container">
        <canvas id="canvas" width="720" height="480"></canvas>

        <!-- Game Over Overlay -->
        <div id="game-over-screen" style="display: none">
          <img
            src="./img/You won, you lost/Game Over.png"
            alt="Game Over"
            class="screen-img"
          />
          <button onclick="restartGame()">🔄 Neu starten</button>
        </div>

        <!-- Win Overlay -->
        <div id="win-screen" style="display: none">
          <img
            src="./img/You won, you lost/You Win A.png"
            alt="You Win!"
            class="screen-img"
          />
          <button onclick="restartGame()">🔄 Nochmal spielen</button>
        </div>

        <!-- Desktop Key-Legend -->
        <div id="key-legend">
          ⬅➡ Bewegen &nbsp;|&nbsp; ⎵ Springen &nbsp;|&nbsp; D Werfen
          &nbsp;|&nbsp; F Vollbild
        </div>
      </div>

      <!-- ── Mobile Controls ─────────────────────────────────────────── -->
      <div id="mobile-controls">
        <div class="dpad">
          <button class="dpad-btn" id="btn-left" aria-label="Links">◀</button>
          <button class="dpad-btn" id="btn-right" aria-label="Rechts">▶</button>
        </div>
        <div class="action-btns">
          <button
            class="action-btn btn-jump"
            id="btn-jump"
            aria-label="Springen"
          >
            ⬆
          </button>
          <button
            class="action-btn btn-throw"
            id="btn-throw"
            aria-label="Werfen"
          >
            🍾
          </button>
        </div>
      </div>
    </div>
    <!-- /game-wrapper -->
  </body>
</html>
