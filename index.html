<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>El Pollo Loco</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rye&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/x-icon" href="./img/8_coin/coin_2.png" />

    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./mobile.css" />

    <script src="./models/drawable-object.class.js"></script>
    <script src="./models/moveable-object.class.js"></script>
    <script src="./models/character.class.js"></script>
    <script src="./models/chicken.class.js"></script>
    <script src="./models/small-ckicken.class.js"></script>
    <script src="./models/cloud.class.js"></script>
    <script src="./models/status-bar.class.js"></script>
    <script src="./models/coin.class.js"></script>
    <script src="./models/bottle-ground.class.js"></script>
    <script src="./models/backgound-object.class.js"></script>
    <script src="./models/keyboard.class.js"></script>
    <script src="./models/level.class.js"></script>
    <script src="./models/throwable-object.class.js"></script>
    <script src="./models/endboss.class.js"></script>
    <script src="./models/world.class.js"></script>
    <script src="./models/world-draw.js"></script>
    <script src="./levels/level1.js"></script>
    <script src="./models/mobile-controls.js"></script>
    <script src="./js/game.js"></script>
  </head>
  <body>
    <div id="all-game-contents">
      <div id="start-screen">
        <div class="start-bg">
          <img src="./img/9_intro_outro_screens/start/startscreen_1.png" />
        </div>
        <div class="start-overlay">
          <div class="start-buttons">
            <button class="menu-btn start-btn" onclick="startGame()">
              ▶ Spiel starten
            </button>
            <button class="menu-btn info-btn" onclick="toggleControls()">
              🎮 Steuerung
            </button>
          </div>
        </div>

        <div id="controls-panel" class="d-none">
          <button class="close-btn" onclick="toggleControls()">✖</button>
          <h2>Steuerung</h2>
          <table>
            <tr>
              <td class="key">⬅ ➡</td>
              <td>Bewegen</td>
            </tr>
            <tr>
              <td class="key">Leertaste</td>
              <td>Springen</td>
            </tr>
            <tr>
              <td class="key">D</td>
              <td>Werfen</td>
            </tr>
            <tr>
              <td class="key">F</td>
              <td>Vollbild (An/Aus)</td>
            </tr>
          </table>
        </div>
      </div>

      <div id="game-wrapper" style="display: none">
        <div id="game-container">
          <canvas id="canvas" width="720" height="480"></canvas>
        </div>
      </div>

      <div id="game-over-screen" class="d-none end-screen">
        <img
          src="./img/You won, you lost/Game Over.png"
          class="end-screen-img"
        />
        <button class="menu-btn restart-btn" onclick="restartGame()">
          🔄 Neustart
        </button>
      </div>

      <div id="win-screen" class="d-none end-screen">
        <img
          src="./img/You won, you lost/You Win A.png"
          class="end-screen-img"
        />
        <button class="menu-btn restart-btn" onclick="restartGame()">
          🔄 Nochmal spielen
        </button>
      </div>
    </div>
  </body>
</html>
