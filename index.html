<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>El Pollo Loco</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rye&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/x-icon" href="./img/8_coin/coin_2.png" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./mobile.css" />

    <script src="./models/drawable-object.class.js"></script>
    <script src="./models/moveable-object.class.js"></script>
    <script src="./models/character.class.js"></script>
    <script src="./models/chicken.class.js"></script>
    <script src="./models/small-ckicken.class.js"></script>
    <script src="./models/cloud.class.js"></script>
    <script src="./models/status-bar.class.js"></script>
    <script src="./models/coin.class.js"></script>
    <script src="./models/bottle-ground.class.js"></script>
    <script src="./models/backgound-object.class.js"></script>
    <script src="./models/keyboard.class.js"></script>
    <script src="./models/level.class.js"></script>
    <script src="./models/throwable-object.class.js"></script>
    <script src="./models/endboss.class.js"></script>
    <script src="./models/world.class.js"></script>
    <script src="./models/world-draw.js"></script>
    <script src="./levels/level1.js"></script>
    <script src="./models/mobile-controls.js"></script>
    <script src="./js/game.js"></script>
  </head>
  <body>
    <div id="rotate-device-screen">
      <span class="rotate-emoji">📱</span>
      <p>Please rotate your device to landscape mode!</p>
    </div>

    <div id="all-game-contents">
      <div id="start-screen">
        <div id="audio-panel" class="audio-controls">
          <button id="mute-btn" onclick="toggleMute()">
            <span id="mute-icon">🔊</span>
          </button>
          <input
            type="range"
            id="volume-slider"
            min="0"
            max="1"
            step="0.01"
            value="0.5"
            oninput="changeVolume(this.value)"
          />
        </div>

        <div class="start-bg">
          <img
            src="./img/9_intro_outro_screens/start/startscreen_1.png"
            alt="Startscreen"
          />
        </div>

        <div class="start-overlay">
          <div class="start-buttons">
            <button class="menu-btn start-btn" onclick="startGame()">
              ▶ Start Game
            </button>
            <button class="menu-btn info-btn" onclick="toggleControls()">
              🎮 Controls
            </button>
          </div>
        </div>

        <div class="mobile-legal-links">
          <a href="./impressum.html">Imprint</a>
          <a href="./datenschutz.html">Privacy Policy</a>
        </div>

        <div id="controls-panel" class="d-none">
          <button class="close-btn" onclick="toggleControls()">✖</button>
          <h2>Controls</h2>
          <table>
            <tr>
              <td class="key">⬅ ➡</td>
              <td>Move</td>
            </tr>
            <tr>
              <td class="key">Space</td>
              <td>Jump</td>
            </tr>
            <tr>
              <td class="key">D</td>
              <td>Throw</td>
            </tr>
            <tr>
              <td class="key">F</td>
              <td>Fullscreen (On/Off)</td>
            </tr>
            <tr>
              <td class="key">M</td>
              <td>Mute (On/Off)</td>
            </tr>
          </table>
        </div>
      </div>

      <div id="game-wrapper" style="display: none">
        <div id="game-container">
          <canvas id="canvas" width="720" height="480"></canvas>

          <div class="mobile-controls">
            <div class="control-group">
              <div id="btn-left" class="mobile-btn">⬅</div>
              <div id="btn-right" class="mobile-btn">➡</div>
            </div>
            <div class="control-group">
              <div id="btn-jump" class="mobile-btn">▲</div>
              <div id="btn-throw" class="mobile-btn">
                <img src="./img/6_salsa_bottle/salsa_bottle.png" alt="throw" />
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="game-over-screen" class="d-none end-screen">
        <img
          src="./img/9_intro_outro_screens/game_over/game over.png"
          class="end-screen-img"
        />
        <button class="menu-btn restart-btn" onclick="restartGame()">
          🔄 Restart
        </button>
      </div>

      <div id="win-screen" class="d-none end-screen">
        <img
          src="./img/You won, you lost/You Win A.png"
          class="end-screen-img"
        />
        <button class="menu-btn restart-btn" onclick="restartGame()">
          🔄 Play Again
        </button>
      </div>
    </div>

    <footer class="footer-fixed">
      <a href="./impressum.html" target="_blank" class="legal-link">Imprint</a>
      <a href="./datenschutz.html" target="_blank" class="legal-link"
        >Privacy Policy</a
      >
    </footer>
  </body>
</html>
